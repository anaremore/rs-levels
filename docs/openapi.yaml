openapi: 3.1.0
info:
  title: RS Levels Local API
  version: 0.1.0
  description: Local-first RocketScooter display-level capture and read-only feed API.
servers:
  - url: http://127.0.0.1:8765
    description: Default loopback service
paths:
  /:
    get:
      summary: Service metadata
      responses:
        '200':
          description: Service metadata and endpoint hints
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootInfo'
  /docs:
    get:
      summary: Built-in API docs page
      responses:
        '200':
          description: Lightweight local API documentation page
          content:
            text/html:
              schema:
                type: string
  /openapi.yaml:
    get:
      summary: OpenAPI YAML spec
      responses:
        '200':
          description: Machine-readable OpenAPI 3.1 specification
          content:
            application/yaml:
              schema:
                type: string
  /swagger.yaml:
    get:
      summary: Swagger-compatible OpenAPI YAML alias
      responses:
        '200':
          description: Alias for the machine-readable OpenAPI 3.1 specification
          content:
            application/yaml:
              schema:
                type: string
  /diagnostics:
    get:
      summary: Local setup diagnostics
      responses:
        '200':
          description: Scrubbed local service diagnostics for setup and support
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Diagnostics'
  /health:
    get:
      summary: Health and freshness
      responses:
        '200':
          description: Current service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
  /status:
    get:
      summary: Compact status
      responses:
        '200':
          description: Network, source, and symbol status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
  /plugins:
    get:
      summary: Display plugin manifest
      responses:
        '200':
          description: Public inventory of display-only adapters included with this release
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginManifest'
  /snapshot:
    get:
      summary: Full level snapshot
      responses:
        '200':
          description: Versioned level snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
  /levels:
    get:
      summary: Flat levels
      responses:
        '200':
          description: All known levels as a flat array
          content:
            application/json:
              schema:
                type: object
                required: [levels]
                properties:
                  levels:
                    type: array
                    items:
                      $ref: '#/components/schemas/Level'
  /levels/{symbol}:
    get:
      summary: Symbol levels
      parameters:
        - $ref: '#/components/parameters/Symbol'
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [rows]
      responses:
        '200':
          description: Symbol snapshot or generic display row feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SymbolSnapshot'
            text/plain:
              schema:
                type: string
                description: Display rows as name,price,red,green,blue,kind.
        '404':
          $ref: '#/components/responses/NotFound'
  /ddbands:
    get:
      summary: DD band levels
      responses:
        '200':
          description: Flat DD band levels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatLevels'
  /zones:
    get:
      summary: Zone levels
      responses:
        '200':
          description: Flat generic, bull, and bear zone levels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatLevels'
  /references:
    get:
      summary: Reference levels
      responses:
        '200':
          description: Flat reference/open-close levels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatLevels'
  /tradingview:
    get:
      summary: TradingView all-symbol paste payload
      responses:
        '200':
          description: All-symbol TradingView RSLEVELS payload
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/TradingViewPayload'
        '404':
          $ref: '#/components/responses/NotFound'
  /tradingview/{symbol}:
    get:
      summary: TradingView single-symbol paste payload
      parameters:
        - $ref: '#/components/parameters/Symbol'
      responses:
        '200':
          description: Single-symbol TradingView RSLEVELS payload
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/TradingViewPayload'
        '404':
          $ref: '#/components/responses/NotFound'
  /stream:
    get:
      summary: Snapshot stream
      responses:
        '200':
          description: Server-Sent Events stream of snapshot messages
          content:
            text/event-stream:
              schema:
                type: string
  /capture/api:
    post:
      summary: Browser-extension capture ingest
      description: Intended for the browser extension. Display clients should use read-only endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapturePayload'
      responses:
        '200':
          description: Capture accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok, snapshot]
                properties:
                  ok:
                    type: boolean
                  snapshot:
                    $ref: '#/components/schemas/Snapshot'
        '400':
          description: Malformed JSON
        '413':
          description: Request body too large
components:
  parameters:
    Symbol:
      name: symbol
      in: path
      required: true
      description: Symbol or alias. ES/MES and CQG EP contracts resolve to the ES family; NQ/MNQ and CQG ENQ contracts resolve to the NQ family. JSON display responses and TradingView payloads use ES/NQ labels.
      schema:
        type: string
        examples: [MES, MNQ, ES, NQ, F.US.EPU, F.US.EPU26, F.US.ENQU, F.US.ENQU26]
  responses:
    NotFound:
      description: Symbol not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    RootInfo:
      type: object
      required: [ok, name, version, build, endpoints, network]
      properties:
        ok:
          type: boolean
        name:
          type: string
        version:
          type: string
        build:
          $ref: '#/components/schemas/BuildInfo'
        endpoints:
          type: array
          items:
            type: string
        network:
          $ref: '#/components/schemas/Network'
    Health:
      type: object
      required: [ok, service, version, build, schemaVersion, generatedAt, network, source, symbolCount, levelCount]
      properties:
        ok:
          type: boolean
        service:
          type: string
        version:
          type: string
        build:
          $ref: '#/components/schemas/BuildInfo'
        schemaVersion:
          type: string
        generatedAt:
          type: string
          format: date-time
        network:
          $ref: '#/components/schemas/Network'
        source:
          $ref: '#/components/schemas/SourceState'
        symbolCount:
          type: integer
        levelCount:
          type: integer
    Status:
      type: object
      required: [ok, version, build, network, source, symbolCount, levelCount, symbols, symbolSummaries]
      properties:
        ok:
          type: boolean
        version:
          type: string
        build:
          $ref: '#/components/schemas/BuildInfo'
        network:
          $ref: '#/components/schemas/Network'
        source:
          $ref: '#/components/schemas/SourceState'
        symbolCount:
          type: integer
        levelCount:
          type: integer
        symbols:
          type: array
          items:
            type: string
        symbolSummaries:
          type: array
          items:
            $ref: '#/components/schemas/SymbolSummary'
    BuildInfo:
      type: object
      required: [revision, generatedAt, source]
      properties:
        revision:
          type: string
          description: Short git revision for packaged builds, blank for source checkouts.
        generatedAt:
          type: string
          description: Package build timestamp, blank for source checkouts.
        source:
          type: string
          enum: [source, package]
    Network:
      type: object
      required: [host, requestedHost, port, remoteAccess, corsOrigins, warnings]
      properties:
        host:
          type: string
        requestedHost:
          type: string
        port:
          type: integer
        remoteAccess:
          type: boolean
        corsOrigins:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    PluginManifest:
      type: object
      required: [schemaVersion, generatedAt, plugins]
      properties:
        schemaVersion:
          type: string
        generatedAt:
          type: string
          format: date-time
        plugins:
          type: array
          items:
            $ref: '#/components/schemas/PluginEntry'
    PluginEntry:
      type: object
      required: [id, name, platform, kind, status, displayOnly, entry, readme, api]
      properties:
        id:
          type: string
        name:
          type: string
        platform:
          type: string
        kind:
          type: string
        status:
          type: string
        displayOnly:
          type: boolean
        entry:
          type: string
        readme:
          type: string
        api:
          type: object
          required: [mode, endpoints]
          properties:
            mode:
              type: string
            endpoints:
              type: array
              items:
                type: string
    Snapshot:
      type: object
      required: [schemaVersion, generatedAt, capturedAt, source, symbols, warnings]
      properties:
        schemaVersion:
          type: string
          example: 0.1.0
        generatedAt:
          type: string
          format: date-time
        capturedAt:
          type: string
        source:
          $ref: '#/components/schemas/SourceState'
        symbols:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SymbolSnapshot'
        warnings:
          type: array
          items:
            type: string
    SourceState:
      type: object
      required: [state, connected, lastCaptureAt, ageMs, endpoints, warnings]
      properties:
        state:
          type: string
          description: Current capture freshness state. The service reports stale when lastCaptureAt is older than the configured stale threshold. The default stale threshold is 23 hours for daily RocketScooter levels.
          enum: [offline, waiting, capturing, stale, error]
        connected:
          type: boolean
          description: True only while the source has a recent non-stale capture.
        lastCaptureAt:
          type: string
        ageMs:
          type: number
          nullable: true
          description: Milliseconds since the service accepted the latest capture, computed when the response is generated.
        endpoints:
          type: array
          items:
            $ref: '#/components/schemas/EndpointSummary'
        warnings:
          type: array
          items:
            type: string
    EndpointSummary:
      type: object
      description: Scrubbed capture endpoint summary. Raw captured URLs are intentionally omitted.
      properties:
        key:
          type: string
        status:
          type: integer
          nullable: true
        capturedAt:
          type: string
        parser:
          type: string
        ok:
          type: boolean
    SymbolSnapshot:
      type: object
      description: User-facing /levels/:symbol JSON responses use ES/NQ family labels. Full /snapshot storage may use canonical MES/MNQ family keys.
      required: [symbol, displaySymbol, price, capturedAt, levels, stats, warnings]
      properties:
        symbol:
          type: string
        displaySymbol:
          type: string
        price:
          type: number
          nullable: true
        capturedAt:
          type: string
        levels:
          type: array
          items:
            $ref: '#/components/schemas/Level'
        stats:
          type: object
        warnings:
          type: array
          items:
            type: string
    SymbolSummary:
      type: object
      description: User-facing status summary with ES/NQ family labels.
      required: [symbol, displaySymbol, levelCount, capturedAt, warnings]
      properties:
        symbol:
          type: string
        displaySymbol:
          type: string
        levelCount:
          type: integer
        capturedAt:
          type: string
        warnings:
          type: array
          items:
            type: string
    Level:
      type: object
      required: [id, symbol, name, price, kind, color, source, capturedAt, metadata]
      properties:
        id:
          type: string
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        kind:
          type: string
          enum: [hp, mhp, zone, zone-bull, zone-bear, dd-band, reference, open-close, yellow-line, red-line, cat, stat, unknown]
        color:
          type: string
        source:
          type: string
        capturedAt:
          type: string
        metadata:
          type: object
    FlatLevels:
      type: object
      required: [levels]
      properties:
        levels:
          type: array
          items:
            $ref: '#/components/schemas/Level'
    TradingViewPayload:
      type: string
      description: Pipe-delimited paste payload for the included Pine indicator: RSLEVELS|2|generatedAt|symbol|capturedAt|name,price,kind;...
      examples:
        - RSLEVELS|2|2026-06-21T03:47:05.860Z|ES|2026-06-21T03:47:02.097Z|OVNHP,7565,hp;DD,7643.5715,dd-band|NQ|2026-06-21T03:47:02.097Z|OVNMHP,30475,mhp
    CapturePayload:
      type: object
      required: [endpoint, capturedAt, body]
      properties:
        endpoint:
          type: string
        url:
          type: string
        method:
          type: string
        status:
          type: integer
        capturedAt:
          type: string
          format: date-time
        body:
          oneOf:
            - type: object
            - type: string
    Diagnostics:
      type: object
      required: [ok, service, version, build, schemaVersion, generatedAt, docs, network, source, symbols, symbolSummaries, levelCount, checks, hints]
      properties:
        ok:
          type: boolean
        service:
          type: string
        version:
          type: string
        build:
          $ref: '#/components/schemas/BuildInfo'
        schemaVersion:
          type: string
        generatedAt:
          type: string
          format: date-time
        docs:
          type: object
          required: [local, openApi, swagger]
          properties:
            local:
              type: string
            openApi:
              type: string
            swagger:
              type: string
        network:
          $ref: '#/components/schemas/Network'
        source:
          $ref: '#/components/schemas/DiagnosticSource'
        symbols:
          type: array
          items:
            type: string
        symbolSummaries:
          type: array
          items:
            $ref: '#/components/schemas/SymbolSummary'
        levelCount:
          type: integer
        checks:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticCheck'
        hints:
          type: array
          items:
            type: string
    DiagnosticSource:
      type: object
      required: [state, connected, lastCaptureAt, ageMs, endpointCount, endpoints, warnings]
      properties:
        state:
          type: string
        connected:
          type: boolean
        lastCaptureAt:
          type: string
        ageMs:
          type: number
          nullable: true
          description: Milliseconds since the service accepted the latest capture, computed when diagnostics are generated.
        endpointCount:
          type: integer
        endpoints:
          type: array
          items:
            type: object
            required: [key, status, capturedAt, parser, ok]
            properties:
              key:
                type: string
              status:
                type: integer
                nullable: true
              capturedAt:
                type: string
              parser:
                type: string
              ok:
                type: boolean
        warnings:
          type: array
          items:
            type: string
    DiagnosticCheck:
      type: object
      required: [id, label, status, detail]
      properties:
        id:
          type: string
        label:
          type: string
        status:
          type: string
          enum: [ok, waiting, warning, error]
        detail:
          type: string
    Error:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
