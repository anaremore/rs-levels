<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RS Levels</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>RS Levels</h1>
        <p id="service-url">Loading</p>
      </div>
      <span id="status-pill" class="pill waiting">WAITING</span>
    </header>

    <section class="panel">
      <div class="row">
        <label for="symbol">Symbol</label>
        <select id="symbol"></select>
      </div>
      <div class="actions">
        <button id="copy-tv" type="button">Copy TradingView</button>
        <button id="copy-json" type="button">Copy JSON</button>
        <button id="copy-diagnostics" type="button">Copy Diagnostics</button>
        <button id="open-docs" type="button">API Docs</button>
        <button id="open-plugins" type="button">Plugins</button>
      </div>
      <p id="message" class="message">Start the local service, then open RocketScooter.</p>
    </section>

    <section class="panel compact">
      <dl>
        <div>
          <dt>Source</dt>
          <dd id="source-state">waiting</dd>
        </div>
        <div>
          <dt>Levels</dt>
          <dd id="level-count">0</dd>
        </div>
        <div>
          <dt>Version</dt>
          <dd id="service-version">unknown</dd>
        </div>
        <div>
          <dt>Posted</dt>
          <dd id="posted-count">0</dd>
        </div>
        <div>
          <dt>Capture</dt>
          <dd id="last-capture">none</dd>
        </div>
        <div>
          <dt>Last post</dt>
          <dd id="last-post">none</dd>
        </div>
        <div>
          <dt>Issue</dt>
          <dd id="last-error">none</dd>
        </div>
        <div>
          <dt>Observed</dt>
          <dd id="observed-count">0</dd>
        </div>
        <div>
          <dt>Ignored</dt>
          <dd id="ignored-count">0</dd>
        </div>
        <div>
          <dt>Skipped</dt>
          <dd id="skipped-count">0</dd>
        </div>
        <div>
          <dt>Hook</dt>
          <dd id="hook-reason">none</dd>
        </div>
      </dl>
    </section>

    <footer>
      <button id="refresh" type="button">Refresh</button>
      <button id="options" type="button">Options</button>
    </footer>
  </main>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
